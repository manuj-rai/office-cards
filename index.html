<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Digital Business Card</title>

<!-- Font Awesome -->
<link rel="stylesheet" href="css/digital-card.css">
   <link href="https://static.fibre2fashion.com/fonts/fontface.min.css" rel="stylesheet" />

</head>

<body>
<div class="main-wrapper">
    <div class="headerbar-wrapper">
            <div class="headerbar-section">

            </div>
            <div class="profile-img">

            </div>
            <div class="profile-details">
                <strong>Bhumika Bhanot</strong>
                <p>Sr. VP - Business Development &<br> Customer Experience</p>
            </div>
            <div class="social-media-icons">
                <ul>
                    <li>
                        <a href="tel:+919909941400">
                            <img src="images/call-icon.svg">
                        </a>
                    </li>
                    <li>
                        <a href="https://wa.me/919909941400" target="_blank">
                            <img src="images/whats-app-icon.svg">
                        </a>
                    </li>
                    <li>
                        <a href="mailto:bhumika@fibre2fashion.com">
                            <img src="images/email.svg">
                        </a>
                    </li>
                     <li>
                        <a href="https://www.fibre2fashion.com/" target="_blank">
                            <img src="images/web-icon.svg">
                        </a>
                    </li>
                    <li>
                        <button type="button" class="share-btn" id="shareCardBtn" aria-label="Share Bhumika Bhanot's digital business card">
                            <img src="images/share.svg" alt="">
                        </button>
                    </li>
                </ul>
                <div class="share-status" id="shareStatus" role="status" aria-live="polite"></div>
            </div>
              <hr>
    </div>
  
    <div class="content-part">
        <div class="contant-details-wrapper">
            <h1><strong>Fibre2Fashion</strong></h1>
            <div class="info-wrapper">
                <div class="info-row">
                    <div class="icon-bx mobile-icon">
                        <img src="images/mobile-icon.svg">
                    </div>
                    <div class="info-details mobilespace">
                        <div>
                            <strong>Mobile:</strong>
                            <p>+91 99099 41400</p>
                        </div>
                        <div class="savecontact"><a href="cards/Bhumika-Bhanot.vcf" id="saveContactLink"> + Save Contact</a></div>
                    </div>
                </div>
                <div class="info-row">
                    <div class="icon-bx">
                        <img src="images/email.svg">
                    </div>
                    <div class="info-details">
                        <strong>Email:</strong>
                        <p>bhumika@fibre2fashion.com</p>
                    </div>
                </div>
                <div class="info-row">
                    <div class="icon-bx">
                        <img src="images/call-icon.svg">
                    </div>
                    <div class="info-details">
                        <strong>Phone:</strong>
                        <p>+91 79 71888555</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="footer-wrapper">
        <div class="scan-details">
            <div class="scan-text">
                <strong>Scan to Explore</strong>
                <img src="https://static.fibre2fashion.com/F2FLogo/Texpro/texpro-logo.svg" width="81">
                <img src="images/arrow-img.svg" width="76">
            </div>
            <div class="qr-code">
                <img src="images/texpro-qrcode.svg" width="144">
            </div>
        </div>
    </div>
</div>
<script>
    (function () {
        var shareButton = document.getElementById('shareCardBtn');
        var shareStatus = document.getElementById('shareStatus');
        var statusTimer;

        function showStatus(message) {
            shareStatus.textContent = message;
            shareStatus.classList.add('is-visible');
            clearTimeout(statusTimer);
            statusTimer = setTimeout(function () {
                shareStatus.classList.remove('is-visible');
                shareStatus.textContent = '';
            }, 3000);
        }

        function copyToClipboard(text) {
            if (navigator.clipboard && window.isSecureContext) {
                return navigator.clipboard.writeText(text);
            }

            var textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.setAttribute('readonly', '');
            textarea.style.position = 'fixed';
            textarea.style.left = '-9999px';
            document.body.appendChild(textarea);
            textarea.select();

            try {
                document.execCommand('copy');
                return Promise.resolve();
            } catch (error) {
                return Promise.reject(error);
            } finally {
                document.body.removeChild(textarea);
            }
        }

        function copyShareLink(url) {
            copyToClipboard(url)
                .then(function () {
                    showStatus('Card link copied.');
                })
                .catch(function () {
                    showStatus('Copy the page URL to share this card.');
                });
        }

        var saveContactLink = document.getElementById('saveContactLink');
        if (saveContactLink) {
            var vcard = [
                'BEGIN:VCARD',
                'VERSION:3.0',
                'FN:Bhumika Bhanot',
                'N:Bhanot;Bhumika;;;',
                'TEL;TYPE=CELL:+919909941400',
                'TEL;TYPE=WORK:+917971888555',
                'EMAIL:bhumika@fibre2fashion.com',
                'ORG:Fibre2Fashion Pvt. Ltd. - TexPro',
                'TITLE:Sr. VP Business Development & Customer Experience',
                'URL:https://www.fibre2fashion.com',
                'END:VCARD'
            ].join('\r\n');

            var ua = navigator.userAgent;
            var isIOS = /iPad|iPhone|iPod/.test(ua) ||
                (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
            var isAndroid = /Android/.test(ua);

            function enc(v) { return encodeURIComponent(v); }

            saveContactLink.addEventListener('click', function (e) {
                e.preventDefault();

                if (isIOS) {
                    window.location.href = 'data:text/vcard;charset=utf-8,' + enc(vcard);
                    return;
                }

                if (isAndroid) {
                    var intent = 'intent:#Intent;' +
                        'action=android.intent.action.INSERT;' +
                        'type=vnd.android.cursor.dir/contact;' +
                        'S.name=' + enc('Bhumika Bhanot') + ';' +
                        'S.phone=' + enc('+919909941400') + ';' +
                        'i.phone_type=2;' +
                        'S.secondary_phone=' + enc('+917971888555') + ';' +
                        'i.secondary_phone_type=3;' +
                        'S.email=' + enc('bhumika@fibre2fashion.com') + ';' +
                        'S.company=' + enc('Fibre2Fashion Pvt. Ltd. - TexPro') + ';' +
                        'S.job_title=' + enc('Sr. VP Business Development & Customer Experience') + ';' +
                        'end';
                    window.location.href = intent;
                    return;
                }

                var blob = new Blob([vcard], { type: 'text/vcard;charset=utf-8' });
                var url = URL.createObjectURL(blob);
                var a = document.createElement('a');
                a.href = url;
                a.download = 'Bhumika-Bhanot.vcf';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                setTimeout(function () { URL.revokeObjectURL(url); }, 1000);
            });
        }

        shareButton.addEventListener('click', function () {
            var shareData = {
                title: 'Bhumika Bhanot - Fibre2Fashion',
                text: 'Digital business card for Bhumika Bhanot, Sr. VP - Business Development & Customer Experience at Fibre2Fashion.',
                url: window.location.href
            };

            if (navigator.share) {
                navigator.share(shareData).catch(function (error) {
                    if (error.name !== 'AbortError') {
                        copyShareLink(shareData.url);
                    }
                });
                return;
            }

            copyShareLink(shareData.url);
        });
    }());
</script>
</body>
</html>
